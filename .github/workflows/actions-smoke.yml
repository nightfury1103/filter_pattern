name: Actions Smoke

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: actions-smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Confirm Actions can queue
        run: |
          echo "Actions smoke workflow queued successfully"
          date -u
