name: Scanner Pages V2

on:
  push:
    branches:
      - main
  schedule:
    # Refresh both D1 and H4 every 2 hours. Cron is UTC; Vietnam time is UTC+7.
    # Runs at minute 1 by request.
    - cron: "1 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: scanner-pages-v2
  cancel-in-progress: true

env:
  DATA_PROVIDER: mixed
  BROKER: exness
  CRYPTO_MODE: wide
  CRYPTO_MARKET_TYPE: perp
  CRYPTO_MAX_SYMBOLS: ""
  CCXT_MAX_WORKERS: "16"
  VNSTOCK_REQUEST_TIMEOUT_SECONDS: "8"
  D1_PERIOD: 180d
  H4_PERIOD: 60d
  D1_UNIVERSE: default
  H4_UNIVERSE: default
  H4_MARKETS: "Commodity,Forex,Crypto"
  NEAR_MATCH_CHART_LIMIT: "5"

jobs:
  scan_d1_shard:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard:
          - id: us-stock
            label: US stock
            markets: "US stock"
            shard_index: 0
            shard_count: 1
          - id: vietnam-stock-0
            label: Vietnam stock 1/3
            markets: "Vietnam stock"
            shard_index: 0
            shard_count: 3
          - id: vietnam-stock-1
            label: Vietnam stock 2/3
            markets: "Vietnam stock"
            shard_index: 1
            shard_count: 3
          - id: vietnam-stock-2
            label: Vietnam stock 3/3
            markets: "Vietnam stock"
            shard_index: 2
            shard_count: 3
          - id: crypto
            label: Crypto
            markets: "Crypto"
            shard_index: 0
            shard_count: 1
          - id: commodity-forex
            label: Commodity, Commodity ETF, Forex
            markets: "Commodity,Commodity ETF,Forex"
            shard_index: 0
            shard_count: 1

    steps:
      - name: Checkout scanner source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install scanner
        run: python -m pip install -e .

      - name: Restore current published site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch --depth=1 origin gh-pages
            git archive origin/gh-pages | tar -x -C public
          fi

      - name: Scan D1 shard
        shell: bash
        run: |
          set -euo pipefail
          echo "event_name=${{ github.event_name }}"
          echo "event_schedule=${{ github.event.schedule || '' }}"
          echo "utc_now=$(date -u '+%Y-%m-%d %H:%M:%S %Z')"
          echo "hcm_now=$(TZ=Asia/Ho_Chi_Minh date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "d1_shard=${{ matrix.shard.label }}"
          python -m filter_pattern.cli scan-all-market \
            --timeframe D1 \
            --out "public/d1-shards/d1-shard-${{ matrix.shard.id }}" \
            --period "$D1_PERIOD" \
            --universe "$D1_UNIVERSE" \
            --broker "$BROKER" \
            --data-provider "$DATA_PROVIDER" \
            --markets "${{ matrix.shard.markets }}" \
            --shard-index "${{ matrix.shard.shard_index }}" \
            --shard-count "${{ matrix.shard.shard_count }}" \
            --near-match-chart-limit "$NEAR_MATCH_CHART_LIMIT" \
            --previous-results "public/d1-shards/d1-shard-${{ matrix.shard.id }}/results.json"

      - name: Upload D1 shard report artifact
        uses: actions/upload-artifact@v4
        with:
          name: d1-shard-${{ matrix.shard.id }}
          path: public/d1-shards/d1-shard-${{ matrix.shard.id }}
          if-no-files-found: error

  scan_h4_shard:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard:
          - id: commodity-forex
            label: Commodity and Forex
            markets: "Commodity,Forex"
            shard_index: 0
            shard_count: 1
          - id: crypto-0
            label: Crypto 1/3
            markets: "Crypto"
            shard_index: 0
            shard_count: 3
          - id: crypto-1
            label: Crypto 2/3
            markets: "Crypto"
            shard_index: 1
            shard_count: 3
          - id: crypto-2
            label: Crypto 3/3
            markets: "Crypto"
            shard_index: 2
            shard_count: 3

    steps:
      - name: Checkout scanner source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install scanner
        run: python -m pip install -e .

      - name: Restore current published site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch --depth=1 origin gh-pages
            git archive origin/gh-pages | tar -x -C public
          fi

      - name: Scan H4 shard
        shell: bash
        run: |
          set -euo pipefail
          echo "event_name=${{ github.event_name }}"
          echo "event_schedule=${{ github.event.schedule || '' }}"
          echo "utc_now=$(date -u '+%Y-%m-%d %H:%M:%S %Z')"
          echo "hcm_now=$(TZ=Asia/Ho_Chi_Minh date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "h4_shard=${{ matrix.shard.label }}"
          python -m filter_pattern.cli scan-all-market \
            --timeframe H4 \
            --out "public/h4-shards/h4-shard-${{ matrix.shard.id }}" \
            --period "$H4_PERIOD" \
            --universe "$H4_UNIVERSE" \
            --broker "$BROKER" \
            --data-provider "$DATA_PROVIDER" \
            --markets "${{ matrix.shard.markets }}" \
            --shard-index "${{ matrix.shard.shard_index }}" \
            --shard-count "${{ matrix.shard.shard_count }}" \
            --near-match-chart-limit "$NEAR_MATCH_CHART_LIMIT" \
            --previous-results "public/h4-shards/h4-shard-${{ matrix.shard.id }}/results.json"

      - name: Upload H4 shard report artifact
        uses: actions/upload-artifact@v4
        with:
          name: h4-shard-${{ matrix.shard.id }}
          path: public/h4-shards/h4-shard-${{ matrix.shard.id }}
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - scan_d1_shard
      - scan_h4_shard
    if: ${{ always() && (needs.scan_d1_shard.result == 'success' || needs.scan_d1_shard.result == 'skipped') && (needs.scan_h4_shard.result == 'success' || needs.scan_h4_shard.result == 'skipped') && (needs.scan_d1_shard.result == 'success' || needs.scan_h4_shard.result == 'success') }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout scanner source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install scanner
        run: python -m pip install -e .

      - name: Remove stale D1 files before artifact restore
        if: needs.scan_d1_shard.result == 'success'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf public/d1
          mkdir -p public/d1
          rm -rf public/d1-shards
          mkdir -p public/d1-shards

      - name: Download D1 shard report artifacts
        if: needs.scan_d1_shard.result == 'success'
        uses: actions/download-artifact@v4
        with:
          pattern: d1-shard-*
          path: public/d1-shards

      - name: Build combined D1 report
        if: needs.scan_d1_shard.result == 'success'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t D1_INPUTS < <(find public/d1-shards -mindepth 2 -maxdepth 2 -name results.json | sort)
          if [[ "${#D1_INPUTS[@]}" -eq 0 ]]; then
            echo "No D1 shard results were downloaded." >&2
            exit 1
          fi
          python -m filter_pattern.cli combine-report \
            --inputs "${D1_INPUTS[@]}" \
            --out public/d1/index.html \
            --results-out public/d1/results.json \
            --copy-assets
          rm -rf public/d1-shards

      - name: Remove stale H4 files before artifact restore
        if: needs.scan_h4_shard.result == 'success'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf public/h4
          mkdir -p public/h4
          rm -rf public/h4-shards
          mkdir -p public/h4-shards

      - name: Download H4 shard report artifacts
        if: needs.scan_h4_shard.result == 'success'
        uses: actions/download-artifact@v4
        with:
          pattern: h4-shard-*
          path: public/h4-shards

      - name: Build combined H4 report
        if: needs.scan_h4_shard.result == 'success'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t H4_INPUTS < <(find public/h4-shards -mindepth 2 -maxdepth 2 -name results.json | sort)
          if [[ "${#H4_INPUTS[@]}" -eq 0 ]]; then
            echo "No H4 shard results were downloaded." >&2
            exit 1
          fi
          python -m filter_pattern.cli combine-report \
            --inputs "${H4_INPUTS[@]}" \
            --out public/h4/index.html \
            --results-out public/h4/results.json \
            --copy-assets
          rm -rf public/h4-shards

      - name: Build site entry report
        shell: bash
        run: |
          set -euo pipefail
          touch public/.nojekyll
          ROOT_INPUTS=()
          if [[ -f public/d1/results.json ]]; then
            ROOT_INPUTS+=(public/d1/results.json)
          fi
          if [[ -f public/h4/results.json ]]; then
            ROOT_INPUTS+=(public/h4/results.json)
          fi
          if [[ "${#ROOT_INPUTS[@]}" -gt 0 ]]; then
            python -m filter_pattern.cli combine-report \
              --inputs "${ROOT_INPUTS[@]}" \
              --out public/index.html
          elif [[ -f public/d1/index.html ]]; then
            cp public/d1/index.html public/index.html
          elif [[ -f public/h4/index.html ]]; then
            cp public/h4/index.html public/index.html
          else
            printf '%s\n' \
              '<!doctype html>' \
              '<html lang="en">' \
              '<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Filter Pattern</title></head>' \
              '<body><h1>Filter Pattern</h1><p>No report has been generated yet. Run the workflow manually with timeframe = all.</p></body>' \
              '</html>' \
              > public/index.html
          fi

      - name: Save generated site branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cd public
          git init
          git add .
          if git diff --cached --quiet; then
            echo "No generated site changes to save."
          else
            git commit -m "Update scanner report"
            git branch -M gh-pages
            git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push --force origin gh-pages
          fi
          cd "$GITHUB_WORKSPACE"
          if [[ -d public/.git ]]; then
            chmod -R u+w public/.git || true
            for attempt in 1 2 3; do
              rm -rf public/.git && break
              sleep 1
            done
            if [[ -d public/.git ]]; then
              echo "::warning::Could not remove public/.git after publishing; continuing because gh-pages was already pushed."
            fi
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Stage Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf pages-public
          mkdir -p pages-public
          rsync -a --delete --exclude='.git' public/ pages-public/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
