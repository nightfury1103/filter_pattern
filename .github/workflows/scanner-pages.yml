name: Scanner Pages

on:
  schedule:
    # Refresh both D1 and H4 every 2 hours. Cron is UTC; Vietnam time is UTC+7.
    # Runs at minute 1 by request.
    - cron: "1 */2 * * *"
  workflow_dispatch:
    inputs:
      timeframe:
        description: "Which report to refresh"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - d1
          - h4
      crypto_mode:
        description: "Crypto universe size"
        required: false
        default: "wide"
        type: choice
        options:
          - core
          - wide
          - static
      crypto_max_symbols:
        description: "Max dynamic crypto symbols. Leave empty to use mode default."
        required: false
        default: ""
      crypto_market_type:
        description: "Crypto market type"
        required: false
        default: "perp"
        type: choice
        options:
          - perp
          - spot

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: scanner-pages
  cancel-in-progress: false

env:
  DATA_PROVIDER: mixed
  BROKER: exness
  CRYPTO_MODE: ${{ github.event.inputs.crypto_mode || 'wide' }}
  CRYPTO_MARKET_TYPE: ${{ github.event.inputs.crypto_market_type || 'perp' }}
  CRYPTO_MAX_SYMBOLS: ${{ github.event.inputs.crypto_max_symbols || '' }}
  CCXT_MAX_WORKERS: "8"
  VNSTOCK_REQUEST_TIMEOUT_SECONDS: "8"
  D1_PERIOD: 180d
  H4_PERIOD: 60d
  D1_UNIVERSE: default
  H4_UNIVERSE: default
  D1_MARKETS: all
  H4_MARKETS: "Commodity,Forex,Crypto"
  NEAR_MATCH_CHART_LIMIT: "5"

jobs:
  scan-d1:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.timeframe == 'all' || github.event.inputs.timeframe == 'd1' }}

    steps:
      - name: Checkout scanner source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install scanner
        run: python -m pip install -e .

      - name: Restore current published site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch --depth=1 origin gh-pages
            git archive origin/gh-pages | tar -x -C public
          fi

      - name: Scan D1
        shell: bash
        run: |
          set -euo pipefail
          echo "event_name=${{ github.event_name }}"
          echo "event_schedule=${{ github.event.schedule || '' }}"
          echo "utc_now=$(date -u '+%Y-%m-%d %H:%M:%S %Z')"
          echo "hcm_now=$(TZ=Asia/Ho_Chi_Minh date '+%Y-%m-%d %H:%M:%S %Z')"
          python -m filter_pattern.cli scan-all-market \
            --timeframe D1 \
            --out public/d1 \
            --period "$D1_PERIOD" \
            --universe "$D1_UNIVERSE" \
            --broker "$BROKER" \
            --data-provider "$DATA_PROVIDER" \
            --markets "$D1_MARKETS" \
            --near-match-chart-limit "$NEAR_MATCH_CHART_LIMIT" \
            --previous-results public/d1/results.json

      - name: Upload D1 report artifact
        uses: actions/upload-artifact@v4
        with:
          name: d1-report
          path: public/d1
          if-no-files-found: error

  scan-h4:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.timeframe == 'all' || github.event.inputs.timeframe == 'h4' }}

    steps:
      - name: Checkout scanner source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install scanner
        run: python -m pip install -e .

      - name: Restore current published site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch --depth=1 origin gh-pages
            git archive origin/gh-pages | tar -x -C public
          fi

      - name: Scan H4
        shell: bash
        run: |
          set -euo pipefail
          echo "event_name=${{ github.event_name }}"
          echo "event_schedule=${{ github.event.schedule || '' }}"
          echo "utc_now=$(date -u '+%Y-%m-%d %H:%M:%S %Z')"
          echo "hcm_now=$(TZ=Asia/Ho_Chi_Minh date '+%Y-%m-%d %H:%M:%S %Z')"
          python -m filter_pattern.cli scan-all-market \
            --timeframe H4 \
            --out public/h4 \
            --period "$H4_PERIOD" \
            --universe "$H4_UNIVERSE" \
            --broker "$BROKER" \
            --data-provider "$DATA_PROVIDER" \
            --markets "$H4_MARKETS" \
            --near-match-chart-limit "$NEAR_MATCH_CHART_LIMIT" \
            --previous-results public/h4/results.json

      - name: Upload H4 report artifact
        uses: actions/upload-artifact@v4
        with:
          name: h4-report
          path: public/h4
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - scan-d1
      - scan-h4
    if: ${{ always() && (needs.scan-d1.result == 'success' || needs.scan-d1.result == 'skipped') && (needs.scan-h4.result == 'success' || needs.scan-h4.result == 'skipped') && (needs.scan-d1.result == 'success' || needs.scan-h4.result == 'success') }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout scanner source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install scanner
        run: python -m pip install -e .

      - name: Restore current published site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch --depth=1 origin gh-pages
            git archive origin/gh-pages | tar -x -C public
          fi

      - name: Remove stale D1 files before artifact restore
        if: needs.scan-d1.result == 'success'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf public/d1
          mkdir -p public/d1

      - name: Download D1 report artifact
        if: needs.scan-d1.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: d1-report
          path: public/d1

      - name: Remove stale H4 files before artifact restore
        if: needs.scan-h4.result == 'success'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf public/h4
          mkdir -p public/h4

      - name: Download H4 report artifact
        if: needs.scan-h4.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: h4-report
          path: public/h4

      - name: Build site entry report
        shell: bash
        run: |
          set -euo pipefail
          touch public/.nojekyll
          if [[ -f public/d1/results.json && -f public/h4/results.json ]]; then
            python -m filter_pattern.cli combine-report \
              --inputs public/d1/results.json public/h4/results.json \
              --out public/index.html
          elif [[ -f public/d1/index.html ]]; then
            cp public/d1/index.html public/index.html
          elif [[ -f public/h4/index.html ]]; then
            cp public/h4/index.html public/index.html
          else
            printf '%s\n' \
              '<!doctype html>' \
              '<html lang="en">' \
              '<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Filter Pattern</title></head>' \
              '<body><h1>Filter Pattern</h1><p>No report has been generated yet. Run the workflow manually with timeframe = all.</p></body>' \
              '</html>' \
              > public/index.html
          fi

      - name: Save generated site branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cd public
          git init
          git add .
          if git diff --cached --quiet; then
            echo "No generated site changes to save."
          else
            git commit -m "Update scanner report"
            git branch -M gh-pages
            git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push --force origin gh-pages
          fi
          rm -rf .git

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
